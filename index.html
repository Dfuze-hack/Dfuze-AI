<!DOCTYPE html>
<html>
<head>
  <title>Dfuze AI Voice Mode</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
      margin: 0;
    }

    h1 { margin-top: 20px; }

    #chat {
      width: 70%;
      height: 420px;
      margin: 20px auto;
      border: 1px solid #333;
      padding: 10px;
      overflow-y: auto;
      background: #111;
      border-radius: 10px;
    }

    .user { color: #4fc3f7; margin: 5px 0; }
    .ai { color: #a5d6a7; margin: 5px 0; }

    .controls {
      margin-top: 10px;
    }

    input {
      width: 50%;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px 12px;
      margin: 5px;
      cursor: pointer;
      border-radius: 6px;
      border: none;
    }

    .mic {
      background: #ff5252;
      color: white;
    }

    .send {
      background: #4caf50;
      color: white;
    }

    select {
      padding: 8px;
      border-radius: 6px;
    }

    .listening {
      color: #ff5252;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🤖 Dfuze AI Voice Mode</h1>

<div id="chat"></div>

<div class="controls">
  <input id="inputBox" placeholder="Type or speak..." />

  <button class="send" onclick="sendMessage()">Send</button>
  <button class="mic" onclick="startVoice()">🎤 Speak</button>

  <br><br>

  🎧 Voice:
  <select id="voiceSelect">
    <option value="sol">Sol 🌞</option>
    <option value="nova">Nova ✨</option>
    <option value="alex">Alex 🤖</option>
  </select>

  <div id="status"></div>
</div>

<script>
const chatBox = document.getElementById("chat");
const status = document.getElementById("status");

// =========================
// 💬 SEND MESSAGE
// =========================
async function sendMessage(textFromVoice = null) {
  const input = document.getElementById("inputBox");
  const message = textFromVoice || input.value;

  if (!message) return;

  chatBox.innerHTML += `<div class="user">🧑 You: ${message}</div>`;
  input.value = "";

  const res = await fetch("http://localhost:3000/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const data = await res.json();
  const reply = data.reply;

  chatBox.innerHTML += `<div class="ai">🤖 Dfuze: ${reply}</div>`;

  chatBox.scrollTop = chatBox.scrollHeight;

  speak(reply);
}

// =========================
// 🎤 VOICE INPUT (SPEECH TO TEXT)
// =========================
const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

const recognition = new SpeechRecognition();
recognition.lang = "en-IN";
recognition.interimResults = false;

function startVoice() {
  recognition.start();
  status.innerHTML = "🎤 Listening...";
  status.className = "listening";
}

recognition.onresult = (event) => {
  const text = event.results[0][0].transcript;

  status.innerHTML = "";
  status.className = "";

  sendMessage(text);
};

recognition.onend = () => {
  status.innerHTML = "";
};

// =========================
// 🔊 VOICE OUTPUT (SOL SYSTEM)
// =========================
function speak(text) {
  const utterance = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();
  const selectedMode = document.getElementById("voiceSelect").value;

  const voiceMap = {
    sol: "Google UK English Female",
    nova: "Google US English Female",
    alex: "Google US English Male"
  };

  const matchVoice = voices.find(v =>
    v.name.toLowerCase().includes((voiceMap[selectedMode] || "").toLowerCase())
  );

  if (matchVoice) {
    utterance.voice = matchVoice;
  }

  utterance.rate = 1;
  utterance.pitch = selectedMode === "sol" ? 1.1 : 1;

  speechSynthesis.speak(utterance);
}
</script>

</body>
</html>
