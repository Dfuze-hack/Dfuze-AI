<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dfuze AI</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui, Arial;
  height: 100vh;
  display: flex;
  background: #0b0f19;
  color: white;
}

/* 🌟 SIDEBAR */
#sidebar {
  width: 260px;
  background: rgba(255,255,255,0.04);
  border-right: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
}

#newChat {
  margin: 10px;
  padding: 10px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.chatItem {
  padding: 10px;
  margin: 5px 10px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  font-size: 14px;
}

.chatItem:hover {
  background: rgba(255,255,255,0.1);
}

/* 🌟 MAIN */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* HEADER */
header {
  padding: 12px;
  text-align: center;
  font-weight: bold;
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* CHAT */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.msg {
  max-width: 70%;
  padding: 12px 14px;
  margin: 8px;
  border-radius: 14px;
  white-space: pre-wrap;
  animation: pop 0.15s ease;
}

@keyframes pop {
  from {transform: scale(0.95); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
}

.bot {
  align-self: flex-start;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
}

/* INPUT */
#inputBox {
  display: flex;
  padding: 12px;
  border-top: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
}

textarea {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  resize: none;
  background: rgba(0,0,0,0.4);
  color: white;
}

button {
  margin-left: 10px;
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <button id="newChat">+ New Chat</button>
  <div id="chatList"></div>
</div>

<!-- MAIN -->
<div id="main">

<header>⚡ DFUZE AI</header>

<div id="chat"></div>

<div id="inputBox">
  <textarea id="input" rows="1" placeholder="Ask something..."></textarea>
  <button onclick="sendMessage()">Send</button>
</div>

</div>

<script>
let currentChat = [];
let chats = JSON.parse(localStorage.getItem("chats") || "[]");

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const chatList = document.getElementById("chatList");

function renderChats() {
  chatList.innerHTML = "";
  chats.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "chatItem";
    div.textContent = "Chat " + (i + 1);
    div.onclick = () => loadChat(i);
    chatList.appendChild(div);
  });
}

function loadChat(i) {
  currentChat = chats[i];
  chat.innerHTML = "";
  currentChat.forEach(m => addMsg(m.text, m.type, false));
}

function newChat() {
  currentChat = [];
  chat.innerHTML = "";
  chats.push(currentChat);
  save();
  renderChats();
}

function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
}

function addMsg(text, type, saveMsg = true) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  if (saveMsg) {
    currentChat.push({ text, type });
    save();
  }
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text, user: "guest" })
  });

  const data = await res.json();
  addMsg(data.reply, "bot");
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById("newChat").onclick = newChat;

renderChats();
newChat();
</script>

</body>
</html>
