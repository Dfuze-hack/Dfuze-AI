<!DOCTYPE html>
<html>
<head>
  <title>Dfuze AI</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      background: #0f0f0f;
      color: white;
    }

    /* SIDEBAR */
    #sidebar {
      width: 220px;
      background: #111;
      padding: 10px;
      border-right: 1px solid #222;
    }

    #newChat {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .chatItem {
      padding: 10px;
      background: #1a1a1a;
      margin-bottom: 5px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* MAIN */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      max-width: 70%;
      padding: 12px;
      margin: 8px;
      border-radius: 14px;
      white-space: pre-wrap;
      animation: pop 0.2s ease;
    }

    .user {
      background: #a855f7;
      margin-left: auto;
    }

    .bot {
      background: #2a2a2a;
      margin-right: auto;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #111;
      border-top: 1px solid #222;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #222;
      color: white;
    }

    button {
      margin-left: 8px;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #sendBtn { background: #22c55e; color: white; }
    #micBtn { background: #3b82f6; color: white; }

    @keyframes pop {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <button id="newChat">+ New Chat</button>
  <div id="chatList"></div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="chat"></div>

  <div id="inputBox">
    <input id="input" placeholder="Type message..." />
    <button id="micBtn">🎤</button>
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
let chats = JSON.parse(localStorage.getItem("chats")) || [];
let currentChat = 0;

const chatBox = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");
const chatList = document.getElementById("chatList");

function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
}

function renderChats() {
  chatList.innerHTML = "";
  chats.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "chatItem";
    div.innerText = "Chat " + (i + 1);
    div.onclick = () => loadChat(i);
    chatList.appendChild(div);
  });
}

function loadChat(i) {
  currentChat = i;
  chatBox.innerHTML = "";
  chats[i].messages.forEach(m => {
    addMsg(m.text, m.role);
  });
}

function newChat() {
  chats.push({ messages: [] });
  save();
  renderChats();
  loadChat(chats.length - 1);
}

document.getElementById("newChat").onclick = newChat;

function addMsg(text, role) {
  const div = document.createElement("div");
  div.className = "msg " + (role === "user" ? "user" : "bot");
  div.innerText = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  speechSynthesis.speak(speech);
}

async function send() {
  const msg = input.value.trim();
  if (!msg) return;

  addMsg(msg, "user");
  chats[currentChat].messages.push({ role: "user", text: msg });

  input.value = "";

  // typing animation
  const typing = document.createElement("div");
  typing.className = "msg bot";
  typing.innerText = "Dfuze AI is typing...";
  chatBox.appendChild(typing);

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      message: msg
    })
  });

  const data = await res.json();

  typing.remove();

  addMsg(data.reply, "bot");
  chats[currentChat].messages.push({ role: "bot", text: data.reply });

  save();

  speak(data.reply);
}

sendBtn.onclick = send;

input.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

// 🎤 voice input
micBtn.onclick = () => {
  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang = "en-US";
  rec.start();

  rec.onresult = (event) => {
    input.value = event.results[0][0].transcript;
  };
};

// init
if (chats.length === 0) newChat();
else loadChat(0);

renderChats();
</script>

</body>
</html>
