<!DOCTYPE html>
<html>
<head>
  <title>Dfuze AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      padding: 10px;
      margin: 8px;
      border-radius: 10px;
      max-width: 70%;
      white-space: pre-wrap;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
    }

    .bot {
      background: #333;
      margin-right: auto;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #1a1a1a;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const text = input.value;
  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text, user: "guest" })
  });

  const data = await res.json();

  addMsg(data.reply, "bot");
}

// 🔥 LOAD HISTORY ON REFRESH
window.onload = async function () {
  const res = await fetch("/api/history?user=guest");
  const data = await res.json();

  (data.messages || []).forEach(m => {
    addMsg(m.content, m.role === "user" ? "user" : "bot");
  });
};
</script>

</body>
</html>
