<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dfuze AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
header {
  padding: 14px;
  background: linear-gradient(90deg, #111, #1a1a1a);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-weight: bold;
  font-size: 18px;
  letter-spacing: 1px;
  border-bottom: 1px solid #222;
}

header img {
  height: 30px;
  width: 30px;
  border-radius: 10px;
  object-fit: contain;
}

/* CHAT */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.msg {
  padding: 12px 14px;
  margin: 10px;
  border-radius: 12px;
  max-width: 75%;
  white-space: pre-wrap;
  line-height: 1.6;
  font-size: 14px;
}

.user { background: #2563eb; margin-left: auto; }
.bot { background: #333; margin-right: auto; }

/* INPUT */
#inputBox {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 12px;
  background: #1a1a1a;
  gap: 8px;
}

input {
  flex: 1;
  max-width: 650px;
  padding: 14px 16px;
  border: none;
  border-radius: 999px;
  outline: none;
  background: #111;
  color: white;
}

/* MIC BUTTON */
#micBtn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  font-size: 18px;
}

/* SEND */
button {
  padding: 12px 16px;
  border: none;
  border-radius: 999px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

/* CODE */
pre {
  background: #0d0d0d;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #222;
  overflow-x: auto;
}
code {
  font-family: monospace;
  color: #00ff99;
}
</style>
</head>

<body>

<header>
  <img src="https://i.postimg.cc/PJ14qMfS/Chat-GPT-Image-Jun-6-2026-04-12-39-PM.png">
  Dfuze AI
</header>

<div id="chat"></div>

<div id="inputBox">
  <button id="micBtn" onclick="startVoice()">🎤</button>
  <input id="input" placeholder="Type or speak..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let isSending = false;
let messages = [];

/* ================= VOICE INPUT ================= */
function startVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Voice not supported");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "en-US";
  recognition.start();

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    input.value = text;
    sendMessage();
  };
}

/* ================= ELEVENLABS VOICE ================= */
async function speak(text) {
  try {
    const res = await fetch("https://api.elevenlabs.io/v1/text-to-speech/qSeXEcewz7tA0Q0qk9fH", {
      method: "POST",
      headers: {
        "xi-api-key": "YOUR_API_KEY",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text,
        model_id: "eleven_multilingual_v2",
        voice_settings: {
          stability: 0.5,
          similarity_boost: 0.8
        }
      })
    });

    const audio = await res.blob();
    const url = URL.createObjectURL(audio);
    new Audio(url).play();

  } catch (err) {
    console.log("Voice error", err);
  }
}

/* ================= CHAT ================= */
function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function streamText(text, container) {
  container.textContent = text;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isSending) return;

  isSending = true;

  addMsg(text, "user");
  messages.push({ role: "user", content: text });
  input.value = "";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: text,
        history: messages,
        user: "guest"
      })
    });

    const data = await res.json();
    const reply = data?.reply || "No response";

    messages.push({ role: "assistant", content: reply });

    const div = document.createElement("div");
    div.className = "msg bot";
    chat.appendChild(div);

    streamText(reply, div);

    /* 🔊 SPEAK */
    await speak(reply);

    /* 🔁 AUTO LOOP (VOICE MODE) */
    startVoice();

  } catch (err) {
    addMsg("Error connecting to AI ❌", "bot");
  }

  isSending = false;
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
