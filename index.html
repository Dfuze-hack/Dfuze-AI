<!DOCTYPE html>
<html>
<head>
<title>Dfuze AI</title>
<style>
body{
background:#0a0f1f;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:800px;
}

h1{
color:#00aaff;
text-align:center;
}

#chat{
height:450px;
border:2px solid #00aaff;
padding:10px;
overflow-y:auto;
background:#111827;
border-radius:10px;
}

input{
width:85%;
padding:12px;
background:#1f2937;
color:white;
border:none;
}

button{
padding:12px;
background:#00aaff;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
<h1>⚡ Dfuze AI ⚡</h1>

<div id="chat"></div>

<input id="message" placeholder="Ask Dfuze AI anything...">
<button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("message");
    const chat = document.getElementById("chat");

    const userMessage = input.value;

    chat.innerHTML += `<p><b>You:</b> ${userMessage}</p>`;

    input.value = "";

    const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: userMessage
        })
    });

    const data = await response.json();

    chat.innerHTML += `<p style="color:#00aaff"><b>Dfuze AI:</b> ${data.reply}</p>`;
}
</script>

</body>
</html>
