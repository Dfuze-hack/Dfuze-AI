<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* CHAT AREA */
  #chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* MESSAGE STYLE */
  .msg {
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 70%;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .user {
    background: #2b7cff;
    align-self: flex-end;
  }

  .bot {
    background: #333;
    align-self: flex-start;
  }

  /* INPUT AREA */
  #inputBox {
    display: flex;
    padding: 10px;
    background: #1a1a1a;
  }

  #input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
    border-radius: 6px;
    font-size: 14px;
  }

  button {
    margin-left: 10px;
    padding: 10px 15px;
    border: none;
    background: #2b7cff;
    color: white;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background: #1f6fe0;
  }
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type a message..." />
  <button onclick="sendMsg()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let messages = []; // session memory only

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

/* ✨ typing animation */
function typeBotMessage(text) {
  const div = document.createElement("div");
  div.className = "msg bot";
  chat.appendChild(div);

  const words = text.split(" ");
  let i = 0;

  function type() {
    if (i < words.length) {
      div.textContent += (i === 0 ? "" : " ") + words[i];
      i++;
      chat.scrollTop = chat.scrollHeight;
      setTimeout(type, 80);
    }
  }

  type();
}

/* 🤖 simple bot logic */
function getBotReply(text) {
  const t = text.toLowerCase();

  if (t.includes("hello") || t.includes("hi")) {
    return "Hey 👋 how are you?";
  }

  if (t.includes("how are you")) {
    return "I'm good 😄 what about you?";
  }

  return "Got it 👍 tell me more!";
}

function sendMsg() {
  const text = input.value.trim();
  if (!text) return;

  messages.push({ role: "user", text });

  addMsg(text, "user");
  input.value = "";

  const reply = getBotReply(text);

  messages.push({ role: "bot", text: reply });

  typeBotMessage(reply);
}

/* ✅ ENTER key support */
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    sendMsg();
  }
});
</script>

</body>
</html>
