<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dfuze AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 14px;
  background: linear-gradient(90deg, #111, #1a1a1a);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-weight: bold;
  font-size: 18px;
  border-bottom: 1px solid #222;
}

header img {
  height: 30px;
  width: 30px;
  border-radius: 10px;
}

/* 🌈 RAINBOW KEYBOARD GLOW (UNCHANGED CSS) */
#input {
  flex: 1;
  max-width: 650px;
  padding: 14px;
  border: none;
  border-radius: 999px;
  background: #111;
  color: white;
  outline: none;
  transition: 0.3s;
}

#input.glow {
  box-shadow: 0 0 8px #ff0000,
              0 0 15px #ff8800,
              0 0 25px #ffff00,
              0 0 35px #00ff00,
              0 0 45px #00ffff,
              0 0 55px #0000ff,
              0 0 65px #ff00ff;
  animation: rainbow 2s linear infinite;
}

@keyframes rainbow {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.msg {
  padding: 12px 14px;
  margin: 10px;
  border-radius: 12px;
  max-width: 75%;
}

.user { background: #2563eb; margin-left: auto; }
.bot { background: #333; margin-right: auto; }

#inputBox {
  display: flex;
  justify-content: center;
  padding: 12px;
  background: #1a1a1a;
  gap: 8px;
}

button {
  padding: 12px 14px;
  border: none;
  border-radius: 999px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

.mic {
  background: #444;
}
</style>
</head>

<body>

<header>
  <img src="https://i.postimg.cc/PJ14qMfS/Chat-GPT-Image-Jun-6-2026-04-12-39-PM.png">
  Dfuze AI
</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type your message..." />
  <button class="mic" onclick="toggleMic()">🎤</button>
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let messages = [];
let voiceEnabled = true;
let recognition;
let isListening = false;

/* MESSAGE */
function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* VOICE */
async function speak(text) {
  if (!voiceEnabled) return;

  const res = await fetch("/api/tts", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  const blob = await res.blob();
  const url = URL.createObjectURL(blob);

  const audio = new Audio(url);
  audio.play();
}

/* CHAT */
async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, "user");
  messages.push({ role: "user", content: text });
  input.value = "";

  // ❌ FIX: remove glow when sending
  input.classList.remove("glow");

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text, history: messages })
  });

  const data = await res.json();
  const reply = data.reply;

  addMsg(reply, "bot");
  messages.push({ role: "assistant", content: reply });

  speak(reply);
}

/* 🎤 MIC */
function toggleMic() {
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Mic not supported ❌");
    return;
  }

  if (!recognition) {
    recognition = new SpeechRecognition();
    recognition.lang = "en-US";

    recognition.onresult = (event) => {
      const text = event.results[0][0].transcript;
      input.value = text;
      input.dispatchEvent(new Event("input")); // 🔥 triggers glow fix
    };
  }

  if (!isListening) {
    recognition.start();
    isListening = true;
  } else {
    recognition.stop();
    isListening = false;
  }
}

/* 🌈 FIXED GLOW LOGIC */
input.addEventListener("input", () => {
  if (input.value.trim().length > 0) {
    input.classList.add("glow");
  } else {
    input.classList.remove("glow");
  }
});

/* ENTER KEY */
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    sendMessage();
  }
});
</script>

</body>
</html>
