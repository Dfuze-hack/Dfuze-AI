<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dfuze AI</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b0f19;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 12px;
  text-align: center;
  background: rgba(255,255,255,0.05);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
}

.msg {
  max-width: 75%;
  padding: 10px 12px;
  margin: 6px;
  border-radius: 12px;
  white-space: pre-wrap;
}

.user {
  align-self: flex-end;
  background: #2563eb;
}

.bot {
  align-self: flex-start;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
}

/* typing bubble */
.typing {
  opacity: 0.7;
  font-size: 13px;
}

/* input */
#inputBox {
  display: flex;
  padding: 10px;
  background: rgba(255,255,255,0.05);
}

textarea {
  flex: 1;
  resize: none;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
  background: #111827;
  color: white;
}

button {
  margin-left: 10px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<header>⚡ Dfuze AI</header>

<div id="chat"></div>

<div id="inputBox">
  <textarea id="input" rows="1" placeholder="Type message..."></textarea>
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let isSending = false;

/* add message */
function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* typing indicator */
function showTyping() {
  const div = document.createElement("div");
  div.className = "msg bot typing";
  div.id = "typing";
  div.textContent = "Dfuze AI is typing...";
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

/* MAIN SEND */
async function sendMessage() {
  const text = input.value.trim();
  if (!text || isSending) return;

  isSending = true;

  addMsg(text, "user");
  input.value = "";

  showTyping();

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, user: "guest" })
    });

    const data = await res.json();

    console.log("SERVER RESPONSE:", data);

    const reply = data?.reply || "No response from AI";

    hideTyping();

    /* STREAMING EFFECT */
    const div = document.createElement("div");
    div.className = "msg bot";
    chat.appendChild(div);

    let i = 0;

    function stream() {
      if (i < reply.length) {
        div.textContent += reply[i];
        i++;
        chat.scrollTop = chat.scrollHeight;
        setTimeout(stream, 10);
      }
    }

    stream();

  } catch (err) {
    hideTyping();
    addMsg("Error connecting to AI ❌", "bot");
  }

  isSending = false;
}

/* ENTER SUPPORT */
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>

</body>
</html>
