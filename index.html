<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dfuze AI Pro Max</title>

<style>
* {
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  background: radial-gradient(circle at top, #0f172a, #05070f);
  color: white;
  overflow: hidden;
}

/* SIDEBAR */
#sidebar {
  width: 280px;
  background: rgba(255,255,255,0.04);
  border-right: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  display: flex;
  flex-direction: column;
}

#topBar {
  padding: 12px;
  font-weight: bold;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

#newChat {
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg,#22c55e,#16a34a);
  color: white;
  font-weight: bold;
  transition: 0.2s;
}

#newChat:hover {
  transform: scale(1.05);
}

.chatItem {
  margin: 6px 10px;
  padding: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.chatItem:hover {
  background: rgba(255,255,255,0.1);
}

.smallBtn {
  background: transparent;
  border: none;
  color: #aaa;
  cursor: pointer;
}

/* MAIN */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* HEADER */
header {
  padding: 14px;
  text-align: center;
  font-weight: bold;
  letter-spacing: 1px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
}

/* CHAT */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 18px;
  display: flex;
  flex-direction: column;
}

.msg {
  max-width: 70%;
  padding: 12px 14px;
  margin: 8px;
  border-radius: 14px;
  animation: pop 0.15s ease;
  white-space: pre-wrap;
  line-height: 1.4;
}

@keyframes pop {
  from {transform: scale(0.95); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

.user {
  align-self: flex-end;
  background: linear-gradient(135deg,#2563eb,#1d4ed8);
}

.bot {
  align-self: flex-start;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
}

/* INPUT */
#inputBox {
  display: flex;
  padding: 12px;
  border-top: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
}

textarea {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  resize: none;
  background: rgba(0,0,0,0.4);
  color: white;
  font-size: 14px;
}

button.send {
  margin-left: 10px;
  padding: 12px 16px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg,#22c55e,#16a34a);
  color: white;
}

/* typing */
.typing {
  font-size: 12px;
  opacity: 0.6;
  margin-left: 10px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% {opacity: 0.2;}
}

/* mobile */
@media(max-width: 700px){
  #sidebar {display:none;}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="topBar">⚡ DFUZE PRO MAX</div>
  <button id="newChat">+ New Chat</button>
  <div id="chatList"></div>
</div>

<!-- MAIN -->
<div id="main">

<header>🚀 DFUZE AI • PRO MAX MODE</header>

<div id="chat"></div>

<div id="inputBox">
  <textarea id="input" rows="1" placeholder="Message Dfuze AI..."></textarea>
  <button class="send" onclick="sendMessage()">Send</button>
</div>

</div>

<script>
let chats = JSON.parse(localStorage.getItem("chats") || "[]");
let current = [];

const chat = document.getElementById("chat");
const chatList = document.getElementById("chatList");
const input = document.getElementById("input");

function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
}

function renderSidebar(){
  chatList.innerHTML = "";

  chats.forEach((c,i)=>{
    const div = document.createElement("div");
    div.className = "chatItem";

    div.innerHTML = `
      <span>Chat ${i+1}</span>
      <button class="smallBtn" onclick="deleteChat(${i})">✖</button>
    `;

    div.onclick = () => loadChat(i);
    chatList.appendChild(div);
  });
}

function newChat(){
  current = [];
  chats.push(current);
  chat.innerHTML = "";
  save();
  renderSidebar();
}

function loadChat(i){
  current = chats[i];
  chat.innerHTML = "";
  current.forEach(m => addMsg(m.text, m.type, false));
}

function deleteChat(i){
  chats.splice(i,1);
  save();
  renderSidebar();
  chat.innerHTML = "";
}

function addMsg(text, type, saveMsg=true){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  if(saveMsg){
    current.push({text, type});
    save();
  }
}

/* fake streaming typing effect */
function addTyping(){
  const div = document.createElement("div");
  div.className = "typing";
  div.id = "typing";
  div.textContent = "Dfuze AI is thinking...";
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping(){
  const t = document.getElementById("typing");
  if(t) t.remove();
}

async function sendMessage(){
  const text = input.value.trim();
  if(!text) return;

  addMsg(text,"user");
  input.value="";

  addTyping();

  const res = await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({message:text,user:"guest"})
  });

  const data = await res.json();

  removeTyping();
  addMsg(data.reply,"bot");
}

/* ENTER FIX */
input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById("newChat").onclick = newChat;

newChat();
renderSidebar();
</script>

</body>
</html>
