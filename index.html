<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let messages = []; // session-only memory

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

/* ✨ Word-by-word typing */
function typeBotMessage(text) {
  const div = document.createElement("div");
  div.className = "msg bot";
  chat.appendChild(div);

  const words = text.split(" ");
  let i = 0;

  function typeWord() {
    if (i < words.length) {
      div.textContent += (i === 0 ? "" : " ") + words[i];
      i++;
      chat.scrollTop = chat.scrollHeight;
      setTimeout(typeWord, 100);
    }
  }

  typeWord();
}

/* 🤖 REAL bot logic (replace later with API if you want) */
function getBotReply(userText) {
  const text = userText.toLowerCase();

  if (text.includes("hi") || text.includes("hello")) {
    return "Hey! 👋 How can I help you today?";
  }

  if (text.includes("how are you")) {
    return "I'm doing great 😄 What about you?";
  }

  return "I don't fully understand that yet 🤔 but I'm learning!";
}

function sendMsg() {
  const text = input.value.trim();
  if (!text) return;

  messages.push({ role: "user", text });

  addMsg(text, "user");
  input.value = "";

  const reply = getBotReply(text);

  messages.push({ role: "bot", text: reply });

  typeBotMessage(reply);
}

/* ✅ ENTER KEY SUPPORT */
input.addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    sendMsg();
  }
});
</script>
