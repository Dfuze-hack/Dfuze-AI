<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dfuze AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 14px;
  background: linear-gradient(90deg, #111, #1a1a1a);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-weight: bold;
  font-size: 18px;
  border-bottom: 1px solid #222;
}

header img {
  height: 30px;
  width: 30px;
  border-radius: 10px;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.msg {
  padding: 12px 14px;
  margin: 10px;
  border-radius: 12px;
  max-width: 75%;
}

.user { background: #2563eb; margin-left: auto; }
.bot { background: #333; margin-right: auto; }

#inputBox {
  display: flex;
  justify-content: center;
  padding: 12px;
  background: #1a1a1a;
  gap: 8px;
}

input {
  flex: 1;
  max-width: 650px;
  padding: 14px;
  border: none;
  border-radius: 999px;
  background: #111;
  color: white;
}

button {
  padding: 12px 14px;
  border: none;
  border-radius: 999px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

.mic {
  background: #444;
}
</style>
</head>

<body>

<header>
  <img src="https://i.postimg.cc/PJ14qMfS/Chat-GPT-Image-Jun-6-2026-04-12-39-PM.png">
  Dfuze AI
</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type your message..." />
  <button class="mic" onclick="toggleMic()">🎤</button>
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let messages = [];
let voiceEnabled = true;

/* ADD MESSAGE */
function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* TEXT TO SPEECH FROM BACKEND */
async function speak(text) {
  if (!voiceEnabled) return;

  const res = await fetch("/api/tts", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  const blob = await res.blob();
  const url = URL.createObjectURL(blob);

  const audio = new Audio(url);
  audio.play();
}

/* CHAT */
async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, "user");
  messages.push({ role: "user", content: text });
  input.value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text, history: messages })
  });

  const data = await res.json();
  const reply = data.reply;

  addMsg(reply, "bot");
  messages.push({ role: "assistant", content: reply });

  // 🔥 AUTO VOICE
  speak(reply);
}

/* MIC TOGGLE (simple placeholder) */
function toggleMic() {
  alert("Mic feature can be upgraded to real speech recognition next 🚀");
}
</script>

</body>
</html>
