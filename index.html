<!DOCTYPE html>
<html>
<head>
  <title>Dfuze AI Fixed</title>

  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      text-align: center;
      margin: 0;
    }

    #chat {
      width: 70%;
      height: 420px;
      margin: 20px auto;
      background: #111;
      border-radius: 10px;
      padding: 10px;
      overflow-y: auto;
      border: 1px solid #333;
    }

    .user { color: #4fc3f7; }
    .ai { color: #a5d6a7; }

    input {
      width: 50%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 12px;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }

    #micBtn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      margin-top: 10px;
      font-size: 28px;
      background: #111;
      color: #00fff7;
      box-shadow: 0 0 15px #00fff7;
    }

    #micBtn.listening {
      background: #00fff7;
      color: black;
    }
  </style>
</head>

<body>

<h1>🤖 Dfuze AI</h1>

<div id="chat"></div>

<input id="inputBox" placeholder="Type here..." />
<button onclick="sendMessage()">Send</button>

<br><br>

<button id="micBtn" onclick="toggleVoice()">🎤</button>

<script>
const chatBox = document.getElementById("chat");
const inputBox = document.getElementById("inputBox");
const micBtn = document.getElementById("micBtn");

let isActive = false;

/* =========================
   💬 ENTER KEY FIX (IMPORTANT)
========================= */
inputBox.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});

/* =========================
   💬 SEND MESSAGE (FIXED)
========================= */
async function sendMessage(textFromVoice = null) {
  const message = textFromVoice || inputBox.value;

  if (!message.trim()) return;

  chatBox.innerHTML += `<div class="user">🧑 You: ${message}</div>`;
  inputBox.value = "";

  try {
    const res = await fetch("http://localhost:3000/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    const reply = data.reply || "No response";

    chatBox.innerHTML += `<div class="ai">🤖 Dfuze: ${reply}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    speak(reply); // 🔊 FIXED VOICE CALL

  } catch (err) {
    chatBox.innerHTML += `<div class="ai">❌ Error connecting to server</div>`;
    console.error(err);
  }
}

/* =========================
   🎤 VOICE INPUT (FIXED)
========================= */
const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

const recognition = new SpeechRecognition();

recognition.lang = "en-IN";
recognition.continuous = false;
recognition.interimResults = false;

function toggleVoice() {
  recognition.start();
  micBtn.classList.add("listening");
}

/* =========================
   🧠 WAKE + SPEECH RESULT
========================= */
recognition.onresult = (event) => {
  const text = event.results[0][0].transcript.toLowerCase();

  micBtn.classList.remove("listening");

  if (text.includes("hey dfuze")) {
    speak("Yes? I'm listening");
    isActive = true;
    return;
  }

  if (isActive) {
    sendMessage(text);
  }
};

recognition.onend = () => {
  micBtn.classList.remove("listening");
};

/* =========================
   🔊 FIXED VOICE OUTPUT
========================= */
function speak(text) {
  const utterance = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();

  const voice = voices.find(v =>
    v.name.toLowerCase().includes("google") ||
    v.name.toLowerCase().includes("female")
  );

  if (voice) utterance.voice = voice;

  utterance.rate = 1;
  utterance.pitch = 1.2;

  speechSynthesis.speak(utterance);
}
</script>

</body>
</html>
