<!DOCTYPE html>
<html>
<head>
  <title>Dfuze AI</title>
  <style>
    body { font-family: Arial; background:#0f0f0f; color:white; text-align:center; }
    #chat { margin:20px auto; width:60%; height:400px; overflow:auto; border:1px solid #333; padding:10px; }
    input { width:60%; padding:10px; }
    button { padding:10px; margin:5px; cursor:pointer; }
    .user { color: #4fc3f7; }
    .ai { color: #a5d6a7; }
  </style>
</head>

<body>

<h1>🤖 Dfuze AI (Voice Enabled)</h1>

<div id="chat"></div>

<input id="inputBox" placeholder="Type or speak..." />
<button onclick="sendMessage()">Send</button>
<button onclick="startVoice()">🎤 Speak</button>

<script>
const chatBox = document.getElementById("chat");

// -------------------
// 💬 SEND MESSAGE
// -------------------
async function sendMessage(textFromVoice = null) {
  const input = document.getElementById("inputBox");
  const message = textFromVoice || input.value;

  if (!message) return;

  chatBox.innerHTML += `<div class="user">🧑 You: ${message}</div>`;
  input.value = "";

  const res = await fetch("http://localhost:3000/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  chatBox.innerHTML += `<div class="ai">🤖 Dfuze: ${data.reply}</div>`;

  speak(data.reply, "sol");
}

// -------------------
// 🎤 VOICE INPUT
// -------------------
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "en-IN";
recognition.interimResults = false;

function startVoice() {
  recognition.start();
}

recognition.onresult = (event) => {
  const text = event.results[0][0].transcript;
  sendMessage(text);
};

// -------------------
// 🔊 VOICE OUTPUT (Sol + others)
// -------------------
function speak(text, voiceMode = "sol") {
  const utterance = new SpeechSynthesisUtterance(text);
  const voices = speechSynthesis.getVoices();

  const voiceMap = {
    sol: "Google UK English Female",
    alex: "Google US English Male",
    nova: "Google US English Female"
  };

  const selected = voices.find(v =>
    v.name.toLowerCase().includes((voiceMap[voiceMode] || "").toLowerCase())
  );

  if (selected) utterance.voice = selected;

  utterance.rate = 1;
  utterance.pitch = 1;

  speechSynthesis.speak(utterance);
}
</script>

</body>
</html>
