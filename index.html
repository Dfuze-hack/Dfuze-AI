<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dfuze AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 12px;
  background: #111;
  text-align: center;
  font-weight: bold;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.msg {
  padding: 10px;
  margin: 8px;
  border-radius: 10px;
  max-width: 70%;
  white-space: pre-wrap;
}

.user {
  background: #2563eb;
  margin-left: auto;
}

.bot {
  background: #333;
  margin-right: auto;
}

.typing {
  opacity: 0.7;
  font-style: italic;
}

#inputBox {
  display: flex;
  padding: 10px;
  background: #1a1a1a;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 12px 16px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<header>🤖 Dfuze AI</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type your message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let isSending = false;

/* 🧠 SESSION MEMORY (RESET ON REFRESH) */
let messages = []; // <- THIS is your full chat memory

/* add message UI */
function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* typing indicator */
function showTyping() {
  const div = document.createElement("div");
  div.className = "msg bot typing";
  div.id = "typing";
  div.textContent = "Dfuze AI is typing...";
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

/* word streaming */
function streamText(text, container) {
  const words = text.split(" ");
  let i = 0;

  function addWord() {
    if (i < words.length) {
      container.textContent += (i === 0 ? "" : " ") + words[i];
      i++;
      chat.scrollTop = chat.scrollHeight;
      setTimeout(addWord, 80);
    }
  }

  addWord();
}

/* SEND MESSAGE */
async function sendMessage() {
  const text = input.value.trim();
  if (!text || isSending) return;

  isSending = true;

  /* store user message */
  messages.push({ role: "user", content: text });

  addMsg(text, "user");
  input.value = "";

  showTyping();

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },

      /* 🔥 SEND FULL CHAT MEMORY */
      body: JSON.stringify({
        message: text,
        history: messages,
        user: "guest"
      })
    });

    const data = await res.json();
    const reply = data?.reply || "No response from AI";

    hideTyping();

    /* store bot reply */
    messages.push({ role: "assistant", content: reply });

    const div = document.createElement("div");
    div.className = "msg bot";
    chat.appendChild(div);

    streamText(reply, div);

  } catch (err) {
    hideTyping();
    addMsg("Error connecting to AI ❌", "bot");
  }

  isSending = false;
}

/* ENTER KEY */
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});
</script>

</body>
</html>
