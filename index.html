<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dfuze AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 14px;
  background: linear-gradient(90deg, #111, #1a1a1a);
  text-align: center;
  font-weight: bold;
  font-size: 18px;
  letter-spacing: 1px;
  border-bottom: 1px solid #222;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.msg {
  padding: 12px 14px;
  margin: 10px;
  border-radius: 12px;
  max-width: 75%;
  white-space: pre-wrap;
  line-height: 1.6;
  font-size: 14px;
}

.user {
  background: #2563eb;
  margin-left: auto;
}

.bot {
  background: #333;
  margin-right: auto;
}

/* typing */
.typing {
  display: flex;
  align-items: center;
  gap: 6px;
  opacity: 0.8;
  font-style: italic;
}

.dots {
  display: flex;
  gap: 4px;
}

.dots span {
  width: 6px;
  height: 6px;
  background: #aaa;
  border-radius: 50%;
  display: inline-block;
  animation: bounce 1.2s infinite ease-in-out;
}

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.3); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}

#inputBox {
  display: flex;
  padding: 10px;
  background: #1a1a1a;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 12px 16px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

/* code block */
pre {
  background: #0d0d0d;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #222;
  overflow-x: auto;
}
code {
  font-family: monospace;
  color: #00ff99;
}
</style>
</head>

<body>

<header>🤖 Dfuze AI</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type your message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let isSending = false;
let messages = [];

/* -------------------------
   MESSAGE ADD
--------------------------*/
function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* -------------------------
   TYPING ANIMATION
--------------------------*/
function showTyping() {
  const div = document.createElement("div");
  div.className = "msg bot typing";
  div.id = "typing";

  div.innerHTML = `
    <span>Dfuze AI is thinking</span>
    <span class="dots"><span></span><span></span><span></span></span>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

/* -------------------------
   SMART MARKDOWN PARSER (NO REGEX ENGINE STYLE)
--------------------------*/
function parseMarkdown(text) {
  const container = document.createElement("div");

  const lines = text.split("\n");
  let inCode = false;
  let codeBlock = "";

  function flushCode() {
    const pre = document.createElement("pre");
    const code = document.createElement("code");
    code.textContent = codeBlock;
    pre.appendChild(code);
    container.appendChild(pre);
    codeBlock = "";
  }

  lines.forEach(line => {

    // CODE BLOCK START/END
    if (line.startsWith("```")) {
      if (!inCode) {
        inCode = true;
      } else {
        inCode = false;
        flushCode();
      }
      return;
    }

    if (inCode) {
      codeBlock += line + "\n";
      return;
    }

    // HEADINGS
    if (line.startsWith("### ")) {
      const h = document.createElement("h3");
      h.textContent = line.replace("### ", "");
      container.appendChild(h);
      return;
    }

    if (line.startsWith("## ")) {
      const h = document.createElement("h2");
      h.textContent = line.replace("## ", "");
      container.appendChild(h);
      return;
    }

    if (line.startsWith("# ")) {
      const h = document.createElement("h1");
      h.textContent = line.replace("# ", "");
      container.appendChild(h);
      return;
    }

    // LISTS
    if (/^\d+\./.test(line)) {
      const p = document.createElement("p");
      p.textContent = "• " + line.replace(/^\d+\.\s*/, "");
      container.appendChild(p);
      return;
    }

    if (line.startsWith("- ")) {
      const p = document.createElement("p");
      p.textContent = "• " + line.replace("- ", "");
      container.appendChild(p);
      return;
    }

    // NORMAL TEXT
    if (line.trim() === "") {
      container.appendChild(document.createElement("br"));
    } else {
      const p = document.createElement("p");
      p.textContent = line;
      container.appendChild(p);
    }
  });

  if (inCode) flushCode();

  return container;
}

/* -------------------------
   ANSWER-FIRST DETECTOR
--------------------------*/
function extractAnswer(text) {
  const match = text.match(/(answer is|answer:|final answer is)\s*(.*)/i);
  if (match) return match[2];
  return null;
}

/* -------------------------
   EMOJI CONTEXT (CONTROLLED)
--------------------------*/
function addEmoji(text) {
  const map = [
    ["rocket", "🚀"],
    ["engine", "⚙️"],
    ["space", "🌌"],
    ["science", "🔬"],
    ["important", "⚡"],
    ["warning", "⚠️"],
    ["tip", "💡"]
  ];

  let out = text;
  map.forEach(([k, e]) => {
    if (out.toLowerCase().includes(k)) {
      out = e + " " + out;
    }
  });

  return out;
}

/* -------------------------
   STREAMING (WORD BY WORD)
--------------------------*/
function streamText(text, container) {
  const words = text.split(" ");
  let i = 0;
  let buffer = "";

  function step() {
    if (i < words.length) {
      buffer += words[i] + " ";
      container.innerHTML = "";
      container.appendChild(parseMarkdown(addEmoji(buffer)));
      i++;
      chat.scrollTop = chat.scrollHeight;

      setTimeout(step, 25); // smooth GPT-like speed
    }
  }

  step();
}

/* -------------------------
   SEND MESSAGE
--------------------------*/
async function sendMessage() {
  const text = input.value.trim();
  if (!text || isSending) return;

  isSending = true;

  messages.push({ role: "user", content: text });

  addMsg(text, "user");
  input.value = "";

  showTyping();

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: text,
        history: messages,
        user: "guest"
      })
    });

    const data = await res.json();
    const reply = data?.reply || "No response";

    hideTyping();

    messages.push({ role: "assistant", content: reply });

    const div = document.createElement("div");
    div.className = "msg bot";
    chat.appendChild(div);

    streamText(reply, div);

  } catch (err) {
    hideTyping();
    addMsg("Error connecting to AI ❌", "bot");
  }

  isSending = false;
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});
</script>

</body>
</html>
