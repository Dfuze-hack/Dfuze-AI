<!DOCTYPE html>
<html>
<head>
  <title>Dfuze AI Voice Mode</title>

  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      text-align: center;
      margin: 0;
    }

    h1 { margin-top: 20px; }

    #chat {
      width: 70%;
      height: 420px;
      margin: 20px auto;
      background: #111;
      border-radius: 10px;
      padding: 10px;
      overflow-y: auto;
      border: 1px solid #333;
    }

    .user { color: #4fc3f7; }
    .ai { color: #a5d6a7; }

    input {
      width: 50%;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px 12px;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }

    /* 🔥 NEON MIC */
    #micBtn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-top: 10px;

      font-size: 30px;
      background: #111;
      color: #00fff7;

      box-shadow: 0 0 10px #00fff7, 0 0 30px #00fff7;
      transition: 0.3s;
    }

    #micBtn.listening {
      background: #00fff7;
      color: black;
      box-shadow: 0 0 30px #00fff7, 0 0 80px #00fff7;
      transform: scale(1.15);
    }

    #status {
      margin-top: 10px;
      color: #ff5252;
    }
  </style>
</head>

<body>

<h1>🤖 Dfuze AI Voice Assistant</h1>

<div id="chat"></div>

<input id="inputBox" placeholder="Type or say something..." />
<button onclick="sendMessage()">Send</button>

<br>

<button id="micBtn" onclick="toggleVoice()">🎤</button>
<div id="status"></div>

<script>
const chatBox = document.getElementById("chat");
const status = document.getElementById("status");
const micBtn = document.getElementById("micBtn");

let isActive = false;

/* ============================
   💬 SEND MESSAGE
============================ */
async function sendMessage(textFromVoice = null) {
  const input = document.getElementById("inputBox");
  const message = textFromVoice || input.value;

  if (!message) return;

  chatBox.innerHTML += `<div class="user">🧑 You: ${message}</div>`;
  input.value = "";

  const res = await fetch("http://localhost:3000/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  chatBox.innerHTML += `<div class="ai">🤖 Dfuze: ${data.reply}</div>`;

  chatBox.scrollTop = chatBox.scrollHeight;

  speak(data.reply);
}

/* ============================
   🎤 VOICE (WAKE WORD SYSTEM)
============================ */
const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

const recognition = new SpeechRecognition();

recognition.continuous = true;
recognition.lang = "en-IN";
recognition.interimResults = false;

function toggleVoice() {
  if (!isActive) {
    recognition.start();
    status.innerText = "🎤 Say 'Hey Dfuze' to activate";
  } else {
    recognition.stop();
    status.innerText = "";
  }
}

/* ============================
   🧠 WAKE WORD LOGIC
============================ */
recognition.onresult = (event) => {
  const text = event.results[event.results.length - 1][0].transcript.toLowerCase();

  console.log("Heard:", text);

  // WAKE WORD
  if (text.includes("hey dfuze")) {
    isActive = true;
    micBtn.classList.add("listening");

    speak("Yes? I'm listening.");
    status.innerText = "🟢 Listening...";
    return;
  }

  // AFTER ACTIVATION
  if (isActive) {
    sendMessage(text);
  }
};

/* ============================
   🔁 AUTO RESTART LISTENER
============================ */
recognition.onend = () => {
  if (!isActive) {
    setTimeout(() => recognition.start(), 500);
  }
};

/* ============================
   🔊 SOL VOICE OUTPUT
============================ */
function speak(text) {
  const utterance = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();

  const solVoice = voices.find(v =>
    v.name.toLowerCase().includes("google") ||
    v.name.toLowerCase().includes("female")
  );

  if (solVoice) utterance.voice = solVoice;

  utterance.rate = 1;
  utterance.pitch = 1.2;

  speechSynthesis.speak(utterance);
}
</script>

</body>
</html>
