<!DOCTYPE html>
<html>
<head>
  <title>Dfuze AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      max-width: 70%;
      padding: 10px 15px;
      margin: 8px;
      border-radius: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #2a2a2a;
      margin-right: auto;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #1a1a1a;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background: gray;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type a message..." />
  <button id="sendBtn" onclick="send()">Send</button>
</div>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const btn = document.getElementById("sendBtn");

  function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = `msg ${type}`;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function send() {
    const msg = input.value;
    if (!msg) return;

    addMessage(msg, "user");
    input.value = "";

    btn.disabled = true;
    addMessage("Dfuze AI is thinking...", "bot");

    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();

    // remove "thinking..."
    chat.lastChild.remove();

    addMessage(data.reply, "bot");

    btn.disabled = false;
  }
</script>

</body>
</html>
