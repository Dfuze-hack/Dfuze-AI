<!DOCTYPE html>
<html>
<head>
  <title>Dfuze AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: 240px;
      background: #111;
      padding: 10px;
      border-right: 1px solid #222;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      max-width: 70%;
      padding: 12px;
      margin: 8px;
      border-radius: 12px;
      white-space: pre-wrap;
    }

    .user { background: #7c3aed; margin-left: auto; }
    .bot { background: #2a2a2a; margin-right: auto; }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #111;
      border-top: 1px solid #222;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #222;
      color: white;
    }

    button {
      margin-left: 8px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    #send { background: #22c55e; color: white; }
    #mic { background: #3b82f6; color: white; }
  </style>
</head>

<body>

<div id="sidebar">
  <h3>Dfuze AI</h3>
  <button onclick="login()">Login</button>
</div>

<div id="main">
  <div id="chat"></div>

  <div id="inputBox">
    <input id="input" placeholder="Message..." />
    <button id="mic">🎤</button>
    <button id="send">Send</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const msg = input.value.trim();
  if (!msg) return;

  addMsg(msg, "user");
  input.value = "";

  const typing = document.createElement("div");
  typing.className = "msg bot";
  typing.innerText = "Dfuze AI is typing...";
  chat.appendChild(typing);

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  typing.remove();
  addMsg(data.reply, "bot");
}

// ENTER KEY
input.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

// MIC (NO AUTO SPEAK — FIXED)
document.getElementById("mic").onclick = () => {
  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang = "en-US";
  rec.start();
  rec.onresult = (e) => {
    input.value = e.results[0][0].transcript;
  };
};

document.getElementById("send").onclick = send;
</script>

</body>
</html>
